<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Global Health Monitor - Pure Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans">
    <div class="container mx-auto px-4 py-12">
        <header class="flex flex-col md:flex-row justify-between items-center mb-16 gap-4 border-b border-gray-800 pb-8">
            <div>
                <h1 class="text-4xl font-extrabold text-white">
                    <i class="fab fa-aws mr-3 text-orange-500"></i> Raw AWS Health Feed
                </h1>
                <p class="text-gray-400 mt-2">Unfiltered service status directly from status.aws.amazon.com</p>
            </div>
            <div id="last-update" class="text-gray-500 text-sm font-mono bg-gray-900 px-4 py-2 rounded-lg border border-gray-800">
                Syncing RSS...
            </div>
        </header>

        <!-- Regional List -->
        <div id="regions-list" class="space-y-6">
            <!-- Region rows injected here -->
        </div>

    </div>

    <script>
        async function fetchHealth() {
            try {
                const res = await fetch('/api/health');
                const data = await res.json();
                updateUI(data);
            } catch (err) {
                console.error("Fetch failed:", err);
            }
        }

        function updateUI(data) {
            document.getElementById('last-update').textContent = `LAST RSS FETCH: ${new Date(data.timestamp).toLocaleTimeString()}`;
            
            const list = document.getElementById('regions-list');
            list.innerHTML = data.regions.map(r => {
                const isHealthy = r.raw.status === 'Healthy';
                const statusColor = isHealthy ? "text-green-400" : "text-red-400";
                const bgColor = isHealthy ? "bg-gray-900" : "bg-red-900/10";
                const borderColor = isHealthy ? "border-gray-800" : "border-red-900/50";

                return `
                <div class="${bgColor} p-8 rounded-2xl border ${borderColor} shadow-xl transition-all">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                        <div>
                            <span class="text-xs font-mono text-gray-500 uppercase tracking-widest block mb-1">${r.region_code}</span>
                            <h3 class="text-2xl font-bold">${r.region_name}</h3>
                        </div>
                        <div class="flex items-center">
                            <span class="mr-3 font-bold ${statusColor}">${r.raw.status.toUpperCase()}</span>
                            <div class="w-3 h-3 rounded-full ${isHealthy ? 'bg-green-500' : 'bg-red-500'}"></div>
                        </div>
                    </div>
                    
                    <div class="bg-black/40 p-6 rounded-xl border border-gray-800 mb-4">
                        <div class="text-sm font-bold text-gray-300 mb-2">LATEST AWS REPORT:</div>
                        <div class="text-lg font-bold text-white mb-2 underline decoration-orange-500/50">${r.raw.title}</div>
                        <div class="text-gray-400 text-sm leading-relaxed">${r.raw.description}</div>
                    </div>

                    <div class="text-[10px] font-mono text-gray-600 flex justify-between">
                        <span>SOURCE: status.aws.amazon.com/rss/ec2-${r.region_code}.rss</span>
                        <span>PUB DATE: ${r.raw.pubDate}</span>
                    </div>
                </div>
            `}).join('');
        }

        fetchHealth();
        setInterval(fetchHealth, 10000); // Check every 10 seconds
    </script>
</body>
</html>
